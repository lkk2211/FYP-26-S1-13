services:
  - type: web
    name: propaisg
    runtime: python
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        sync: false        # Set this manually in Render dashboard → paste your Supabase connection string
      - key: ONEMAP_EMAIL
        sync: false        # Set this manually in Render dashboard → your OneMap account email
      - key: ONEMAP_PASSWORD
        sync: false        # Set this manually in Render dashboard → your OneMap account password
      - key: URA_ACCESS_KEY
        sync: false        # Set this manually in Render dashboard → register at ura.gov.sg/maps/api/reg.html
      - key: PYTHON_VERSION
        value: 3.11.0
