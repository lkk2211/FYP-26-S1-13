services:
  - type: web
    name: propaisg
    runtime: python
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt && python train_model.py && (python train_model_private.py || echo "Private model skipped — upload URA data via admin or set URA_ACCESS_KEY")
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --timeout 300 --workers 2
    envVars:
      - key: DATABASE_URL
        sync: false        # Set in Render dashboard → Supabase connection string
      - key: URA_ACCESS_KEY
        sync: false        # Set in Render dashboard → your URA access key
      - key: PYTHON_VERSION
        value: 3.11.0
